<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Atendimento</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f2a;

}

.container{
padding:40px 20px;
}

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
color:#cbd5e1;
margin-bottom:40px;
}

.card{

.card h3{

}

.btn{
display:block;
background:#25d366;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;

}

.btn:hover{

}

</style>
</head>

<body>

<div class="container">

<div class="logo">SUPORTE AO CLIENTE</div>
<div class="sub">Escolha uma opção de atendimento</div>

<div class="card">

<p>Fale com um atendente agora</p>
<a class="btn" href="https://wa.me/5531996374883">Abrir WhatsApp</a>
</div>

<div class="card">
<h3>Suporte</h3>
<p>Atualizações</p>
<a class="btn" href="https://wa.me/5531996374883">Solicitar Suporte</a>
</div>

<div class="card">
<h3>Emitir</h3>
<p>Atualização</p>
<a class="btn" href="https://wa.me/5531996374883">Falar com Atendente</a>
</div>

</div>

</body>
</html>
